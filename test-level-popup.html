<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level popup test — PenguCrush</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      background: url('/assets/board/bg-arctic.png') center/cover no-repeat fixed;
    }
    .test-toolbar {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      gap: 8px;
      font-family: Fredoka, sans-serif;
    }
    .test-toolbar button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #1a4a6e;
      color: #fff;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .test-toolbar button:hover { background: #25638f; }
    #levelPopup { display: flex; }
  </style>
</head>
<body>
  <div class="test-toolbar">
    <button type="button" id="btnWin3">Win · 3★</button>
    <button type="button" id="btnWin1">Win · 1★</button>
    <button type="button" id="btnFail">Fail</button>
  </div>

  <div class="level-popup-overlay active" id="levelPopup">
    <div class="level-popup">
      <img src="/assets/ui/level-popup-frame.png" class="level-popup-bg" draggable="false" alt="" />
      <div class="level-popup-content">
        <div class="level-popup-title" id="levelPopupTitle">
          <span class="level-popup-title-label">LEVEL</span>
          <span class="level-popup-title-num">1</span>
        </div>
        <div class="level-popup-stars" id="levelPopupStars"></div>
        <div class="level-popup-score" id="levelPopupScore">12,450</div>
        <div class="level-popup-objective" id="levelPopupObjective">3 stars earned</div>
        <div class="level-popup-buttons">
          <button type="button" class="level-popup-btn level-popup-btn--map">Map</button>
          <button type="button" class="level-popup-btn level-popup-btn--replay">Retry</button>
          <button type="button" class="level-popup-btn level-popup-btn--next" id="levelPopupNext">Next</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const title = document.getElementById('levelPopupTitle');
    const starsEl = document.getElementById('levelPopupStars');
    const scoreEl = document.getElementById('levelPopupScore');
    const objEl = document.getElementById('levelPopupObjective');
    const nextBtn = document.getElementById('levelPopupNext');

    function renderStars(count) {
      starsEl.innerHTML = '';
      for (let i = 0; i < 3; i++) {
        const img = document.createElement('img');
        if (i < count) {
          img.src = '/assets/ui/star-gold.png';
          img.classList.add('earned');
          img.style.animationDelay = `${i * 0.15}s`;
        } else {
          img.style.visibility = 'hidden';
        }
        starsEl.appendChild(img);
      }
    }

    function showWin(stars) {
      title.classList.remove('fail');
      title.innerHTML = '<span class="level-popup-title-label">LEVEL</span><span class="level-popup-title-num">1</span>';
      renderStars(stars);
      scoreEl.textContent = '12,450';
      objEl.textContent = `${stars} star${stars !== 1 ? 's' : ''} earned`;
      nextBtn.classList.remove('hidden');
    }

    function showFail() {
      title.innerHTML = 'Out of<br>Moves!';
      title.classList.add('fail');
      renderStars(0);
      scoreEl.textContent = '3,200';
      objEl.textContent = 'Try again!';
      nextBtn.classList.add('hidden');
    }

    document.getElementById('btnWin3').onclick = () => showWin(3);
    document.getElementById('btnWin1').onclick = () => showWin(1);
    document.getElementById('btnFail').onclick = showFail;

    showWin(3);
  </script>
</body>
</html>
