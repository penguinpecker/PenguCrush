<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenguCrush — Level Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/map.css" />
</head>
<body>
  <!--
    The trick: ONE container that maintains the image's exact aspect ratio,
    scales to fit the viewport (letterboxed), and holds BOTH the image
    and the nodes. Nodes are % of this container = always aligned.
  -->
  <div class="map-stage" id="mapStage">
    <img src="/assets/map-bg.png" class="map-img" draggable="false" />
    <div class="map-nodes" id="mapNodes"></div>
  </div>

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-card">
      <button class="popup-close" id="popupClose">✕</button>
      <div class="popup-badge">
        <div class="popup-badge-inner">
          <span class="popup-level-label">Level</span>
          <span class="popup-level-num" id="popupLevelNum">1</span>
        </div>
      </div>
      <div class="popup-stars" id="popupStars">
        <span class="star">★</span><span class="star">★</span><span class="star">★</span>
      </div>
      <div class="popup-objectives">
        <div class="obj-row">
          <div class="obj-item"><span class="obj-icon">🎯</span><span class="obj-text">Score <strong id="popupTarget">3,000</strong> points</span></div>
          <div class="obj-item"><span class="obj-icon">🕐</span><span class="obj-text"><strong id="popupMoves">30</strong> Moves</span></div>
        </div>
        <div class="obj-best">Best Score: <span id="popupBest">—</span> 🏆</div>
      </div>
      <div class="popup-boosters">
        <div class="booster-slot"><div class="booster-icon">💣</div><div class="booster-count">x3</div></div>
        <div class="booster-slot"><div class="booster-icon">➡️</div><div class="booster-count">x1</div></div>
        <div class="booster-slot"><div class="booster-icon">❄️</div><div class="booster-count">x2</div></div>
        <div class="booster-slot add"><div class="booster-icon">+</div></div>
      </div>
      <div class="popup-actions">
        <button class="btn-back" id="popupBack">← Back to Map</button>
        <button class="btn-play" id="popupPlay">PLAY</button>
      </div>
      <div class="popup-penguin">🐧</div>
    </div>
  </div>

  <script src="/src/map.js"></script>
</body>
</html>
