<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenguCrush — Level Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/map.css" />
</head>
<body>
  <div class="map-stage" id="mapStage">
    <img src="/assets/map-bg.png" class="map-img" draggable="false" />
    <div class="map-nodes" id="mapNodes"></div>
  </div>

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-frame">
      <img src="/assets/popup-frame.png" class="popup-bg" draggable="false" />
      <div class="popup-content">
        <div class="pop-level">
          <span class="pop-level-label">Level</span>
          <span class="pop-level-num" id="popupLevelNum">1</span>
        </div>
        <div class="pop-stars" id="popupStars">
          <img class="pop-star" data-index="0" src="/assets/star-empty.png" />
          <img class="pop-star" data-index="1" src="/assets/star-empty.png" />
          <img class="pop-star" data-index="2" src="/assets/star-empty.png" />
        </div>
        <div class="pop-objectives">
          <span class="pop-obj-score">Score <strong id="popupTarget">3,000</strong> points</span>
          <span class="pop-obj-moves"><strong id="popupMoves">30</strong> Moves</span>
        </div>
        <div class="pop-best">Best Score: <span id="popupBest">—</span> 🏆</div>
        <button class="pop-play" id="popupPlay">PLAY</button>
        <button class="pop-back" id="popupBack">◀ Back to Map</button>
        <button class="pop-close" id="popupClose">✕</button>
      </div>
    </div>
  </div>

  <script src="/src/map.js"></script>
</body>
</html>
