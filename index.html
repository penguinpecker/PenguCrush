<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenguCrush</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- ═══ LOADING SCREEN ═══ -->
  <div id="loadingScreen" class="loading-screen" aria-busy="true" aria-label="Loading game">
    <div class="loading-screen__content" id="loadingScreenContent">
      <picture>
        <source srcset="/assets/loading/splash-poster.webp" type="image/webp" />
        <img
          id="loadingPoster"
          class="loading-screen__poster"
          src="/assets/loading/splash-poster.jpg"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
      <video
        id="loadingVideo"
        class="loading-screen__video"
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="/assets/loading/splash.mp4" type="video/mp4" />
      </video>
      <div class="loading-screen__progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="loadingProgress">
        <div class="loading-screen__progress-fill" id="loadingBarFill"></div>
      </div>
    </div>
  </div>

  <!-- ═══ HOME SCREEN ═══ -->
  <div id="homeScreen" class="screen screen--hidden">
    <div class="home-stage">
      <video class="home-bg" autoplay loop muted playsinline>
        <source src="/assets/ui/home-video.mp4" type="video/mp4" />
      </video>
      <button class="home-play-btn" id="homePlayBtn" aria-label="Connect Wallet and Play"></button>
    </div>
  </div>

  <!-- ═══ MAP SCREEN ═══ -->
  <div id="mapScreen" class="screen screen--hidden">
    <!-- Crush Pass banner -->
    <img src="/assets/ui/crush-pass.png" class="crush-pass" draggable="false" alt="Crush Pass Weekly" />

    <!-- AGW wallet button -->
    <button class="agw-btn" id="agwBtn">Connect Wallet</button>

    <div class="map-stage" id="mapStage">
      <div class="map-scene">
        <img src="/assets/map/map-bg.png" class="map-img" draggable="false" />
        <div class="map-nodes" id="mapNodes"></div>
      </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
      <div class="popup-frame">
        <img src="/assets/ui/popup-frame.png" class="popup-bg" draggable="false" />
        <div class="popup-content">
          <div class="pop-level">
            <span class="pop-level-label">Level</span>
            <span class="pop-level-num" id="popupLevelNum">1</span>
          </div>
          <div class="pop-stars" id="popupStars">
            <img class="pop-star" data-index="0" src="/assets/ui/star-empty.png" />
            <img class="pop-star" data-index="1" src="/assets/ui/star-empty.png" />
            <img class="pop-star" data-index="2" src="/assets/ui/star-empty.png" />
          </div>
          <div class="pop-objectives">
            <span class="pop-obj-score">Score <strong id="popupTarget">3,000</strong> points</span>
            <span class="pop-obj-moves"><strong id="popupMoves">30</strong> Moves</span>
          </div>
          <div class="pop-best">Best Score: <span id="popupBest">—</span> 🏆</div>
          <button class="pop-play" id="popupPlay">PLAY</button>
          <button class="pop-back" id="popupBack">◀ Back to Map</button>
          <button class="pop-close" id="popupClose">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ GAME SCREEN ═══ -->
  <div id="gameScreen" class="screen screen--hidden">
    <div id="app" class="app">
      <img src="/assets/hud/logo.png" class="logo" alt="PenguCrush" />
      <div class="hud">
        <div class="hud-panel">
          <canvas id="scoreCanvas" class="hud-canvas"></canvas>
        </div>
        <div class="hud-panel">
          <canvas id="movesCanvas" class="hud-canvas"></canvas>
        </div>
      </div>
      <span id="scoreVal" style="display:none">0</span>
      <span id="movesVal" style="display:none">30</span>
      <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>
      <div class="booster-bar" id="boosterBar"></div>
    </div>
    <div class="msg" id="msg"></div>

    <!-- Level Complete / Fail Popup -->
    <div class="level-popup-overlay" id="levelPopup">
      <div class="level-popup">
        <img src="/assets/ui/level-popup-frame.png" class="level-popup-bg" draggable="false" />
        <div class="level-popup-content">
          <div class="level-popup-title" id="levelPopupTitle">
            <span class="level-popup-title-label">LEVEL</span>
            <span class="level-popup-title-num">1</span>
          </div>
          <div class="level-popup-stars" id="levelPopupStars"></div>
          <div class="level-popup-score" id="levelPopupScore">0</div>
          <div class="level-popup-objective" id="levelPopupObjective"></div>
          <div class="level-popup-buttons">
            <button class="level-popup-btn level-popup-btn--map" id="levelPopupMap">Map</button>
            <button class="level-popup-btn level-popup-btn--replay" id="levelPopupReplay">Retry</button>
            <button class="level-popup-btn level-popup-btn--next" id="levelPopupNext">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SHOP POPUP ═══ -->
  <div class="shop-overlay" id="shopOverlay">
    <div class="shop-popup">
      <img src="/assets/ui/shop-popup.png" class="shop-popup__img" draggable="false" alt="Ice Shop" />
      <button class="shop-popup__close" id="shopClose" aria-label="Close shop"></button>
      <!-- Shop items overlaid on image slots -->
      <div class="shop-items">
        <div class="shop-item" data-item="colorBomb">
          <div class="shop-item__icon">💣</div>
          <div class="shop-item__name">Color Bomb</div>
          <div class="shop-item__price">$2.99</div>
          <button class="shop-item__buy">BUY</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV BAR ═══ -->
  <nav class="nav-bar" id="navBar">
    <div class="nav-bar__inner">
      <img src="/assets/ui/navbar.png" class="nav-bar__bg" draggable="false" alt="" />
      <div class="nav-bar__buttons">
        <button class="nav-btn" data-page="home"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="map"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="shop"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="leaderboard"><span class="nav-btn__glow"></span></button>
      </div>
    </div>
  </nav>

  <script type="module" src="/src/entry.js"></script>
</body>
</html>
