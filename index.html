<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenguCrush</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loadingScreen" class="loading-screen" aria-busy="true" aria-label="Loading game">
    <div class="loading-screen__content" id="loadingScreenContent">
      <picture>
        <source srcset="/assets/loading-poster.webp" type="image/webp" />
        <img
          id="loadingPoster"
          class="loading-screen__poster"
          src="/assets/loading-poster.jpg"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
      <video
        id="loadingVideo"
        class="loading-screen__video"
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="/assets/loading.webm" type="video/webm" />
        <source src="/assets/loading.mp4" type="video/mp4" />
      </video>
      <div class="loading-screen__progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="loadingProgress">
        <div class="loading-screen__progress-fill" id="loadingBarFill"></div>
      </div>
    </div>
  </div>

  <div id="app" class="app app--hidden">
    <img src="/assets/logo.png" class="logo" alt="PenguCrush" />
    <div class="hud">
      <div class="hud-panel">
        <canvas id="scoreCanvas" class="hud-canvas"></canvas>
      </div>
      <div class="hud-panel">
        <canvas id="movesCanvas" class="hud-canvas"></canvas>
      </div>
    </div>
    <span id="scoreVal" style="display:none">0</span>
    <span id="movesVal" style="display:none">30</span>
    <div class="game-wrapper">
      <canvas id="gameCanvas"></canvas>
    </div>
  </div>
  <div class="msg" id="msg"></div>
  <script type="module" src="/src/entry.js"></script>
</body>
</html>
