<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PenguCrush</title>
  <script>
    // Polyfill Node's `global` for npm packages (e.g. buffer via Privy) that
    // expect it in the browser. Must run before any module script.
    window.global ||= window;
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- ═══ LOADING SCREEN ═══ -->
  <div id="loadingScreen" class="loading-screen" aria-busy="true" aria-label="Loading game">
    <div class="loading-screen__content" id="loadingScreenContent">
      <picture>
        <source srcset="/assets/loading/splash-poster.webp" type="image/webp" />
        <img
          id="loadingPoster"
          class="loading-screen__poster"
          src="/assets/loading/splash-poster.jpg"
          alt=""
          width="1920"
          height="1080"
          decoding="async"
          fetchpriority="high"
        />
      </picture>
      <video
        id="loadingVideo"
        class="loading-screen__video"
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="/assets/loading/splash.mp4" type="video/mp4" />
      </video>
      <div class="loading-screen__progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="loadingProgress">
        <div class="loading-screen__progress-fill" id="loadingBarFill"></div>
      </div>
    </div>
  </div>

  <!-- ═══ HOME SCREEN ═══ -->
  <div id="homeScreen" class="screen screen--hidden">
    <div class="home-stage">
      <video class="home-bg" autoplay loop muted playsinline>
        <source src="/assets/ui/home-video.mp4" type="video/mp4" />
      </video>
      <button class="home-play-btn" id="homePlayBtn" aria-label="Connect Wallet and Play"></button>
      <p class="home-gate-hint" id="homeGateHint" hidden>Connect your wallet to continue</p>
    </div>
  </div>


  <!-- ═══ MAP SCREEN ═══ -->
  <div id="mapScreen" class="screen screen--hidden">
    <!-- Crush Pass banner -->
    <img src="/assets/ui/crush-pass.png" class="crush-pass" draggable="false" alt="Crush Pass Weekly" />

    <!-- AGW wallet button -->
    <button class="agw-btn" id="agwBtn">Connect Wallet</button>

    <!-- Disconnect confirm dialog -->
    <div class="confirm-overlay" id="disconnectConfirm" aria-hidden="true">
      <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="disconnectTitle">
        <h3 class="confirm-title" id="disconnectTitle">Disconnect wallet?</h3>
        <p class="confirm-msg">You'll need to reconnect and sign in again to save progress.</p>
        <div class="confirm-actions">
          <button type="button" class="confirm-btn confirm-btn--cancel" id="disconnectCancel">Cancel</button>
          <button type="button" class="confirm-btn confirm-btn--ok" id="disconnectOk">Disconnect</button>
        </div>
      </div>
    </div>

    <div class="map-stage" id="mapStage">
      <div class="map-scene">
        <img src="/assets/map/map-bg.png" class="map-img" draggable="false" />
        <div class="map-nodes" id="mapNodes"></div>
        <button type="button" class="daily-wheel-btn" id="dailyWheelOpen" aria-label="Open daily spin">
          <img src="/assets/ui/daily-wheel.png" alt="" class="daily-wheel-btn__img" draggable="false" />
        </button>
      </div>
    </div>

    <div class="daily-wheel-overlay" id="dailyWheelOverlay" aria-hidden="true">
      <div class="daily-wheel-overlay__backdrop"></div>
      <button type="button" class="daily-wheel-overlay__close" id="dailyWheelClose" aria-label="Close daily spin">×</button>
      <div class="daily-wheel-full">
        <div class="daily-wheel-full__stage">
          <div class="daily-wheel-full__pointer" aria-hidden="true"></div>
          <div class="daily-wheel-full__spin" id="dailyWheelSpin">
            <img src="/assets/ui/daily-wheel.png" class="daily-wheel-full__img" alt="" draggable="false" />
            <div class="daily-wheel-pies" aria-hidden="true">
              <!-- Mask = pie wedge (clip only); label is sibling so text isn’t clipped by clip-path -->
              <div class="daily-wheel-slice" data-slice="0" style="--i: 0">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
              <div class="daily-wheel-slice" data-slice="1" style="--i: 1">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
              <div class="daily-wheel-slice" data-slice="2" style="--i: 2">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
              <div class="daily-wheel-slice" data-slice="3" style="--i: 3">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
              <div class="daily-wheel-slice" data-slice="4" style="--i: 4">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
              <div class="daily-wheel-slice" data-slice="5" style="--i: 5">
                <div class="daily-wheel-slice__mask" aria-hidden="true"></div>
                <div class="daily-wheel-slice__label"></div>
              </div>
            </div>
          </div>
        </div>
        <button type="button" class="daily-wheel-spin-btn" id="dailyWheelSpinBtn">SPIN</button>
        <p class="daily-wheel-result" id="dailyWheelResult" hidden></p>
      </div>
    </div>

    <div class="popup-overlay" id="popupOverlay">
      <div class="popup-frame">
        <img src="/assets/ui/popup-frame.png" class="popup-bg" draggable="false" />
        <div class="popup-content">
          <div class="pop-level">
            <span class="pop-level-label">Level</span>
            <span class="pop-level-num" id="popupLevelNum">1</span>
          </div>
          <div class="pop-stars" id="popupStars">
            <img class="pop-star" data-index="0" src="/assets/ui/star-empty.png" />
            <img class="pop-star" data-index="1" src="/assets/ui/star-empty.png" />
            <img class="pop-star" data-index="2" src="/assets/ui/star-empty.png" />
          </div>
          <div class="pop-objectives">
            <span class="pop-obj-score">Score <strong id="popupTarget">3,000</strong> points</span>
            <span class="pop-obj-moves"><strong id="popupMoves">30</strong> Moves</span>
          </div>
          <div class="pop-best">Best Score: <span id="popupBest">—</span> 🏆</div>
          <button class="pop-play" id="popupPlay">PLAY</button>
          <button class="pop-back" id="popupBack">◀ Back to Map</button>
          <button class="pop-close" id="popupClose">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ GAME SCREEN ═══ -->
  <div id="gameScreen" class="screen screen--hidden">
    <button class="game-back-btn" id="gameBackBtn" aria-label="Leave level and return to map">
      <span class="game-back-btn__arrow" aria-hidden="true">◀</span>
      <span class="game-back-btn__label">Map</span>
    </button>
    <div id="app" class="app">
      <img src="/assets/hud/logo.png" class="logo" alt="PenguCrush" />
      <div class="hud">
        <div class="hud-panel">
          <canvas id="scoreCanvas" class="hud-canvas"></canvas>
        </div>
        <div class="hud-panel">
          <canvas id="movesCanvas" class="hud-canvas"></canvas>
        </div>
      </div>
      <span id="scoreVal" style="display:none">0</span>
      <span id="movesVal" style="display:none">30</span>
      <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>
      <div class="booster-bar" id="boosterBar"></div>
    </div>
    <div class="msg" id="msg"></div>

    <!-- Leave-level confirm dialog -->
    <div class="confirm-overlay" id="leaveConfirm" aria-hidden="true">
      <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="leaveTitle">
        <h3 class="confirm-title" id="leaveTitle">Leave this level?</h3>
        <p class="confirm-msg">Your progress on this level will not be saved.</p>
        <div class="confirm-actions">
          <button type="button" class="confirm-btn confirm-btn--cancel" id="leaveCancel">Keep Playing</button>
          <button type="button" class="confirm-btn confirm-btn--ok" id="leaveOk">Leave</button>
        </div>
      </div>
    </div>

    <!-- Level Complete / Fail Popup -->
    <div class="level-popup-overlay" id="levelPopup">
      <div class="level-popup">
        <img src="/assets/ui/level-popup-frame.png" class="level-popup-bg" draggable="false" />
        <div class="level-popup-content">
          <div class="level-popup-title" id="levelPopupTitle">
            <span class="level-popup-title-label">LEVEL</span>
            <span class="level-popup-title-num">1</span>
          </div>
          <div class="level-popup-stars" id="levelPopupStars"></div>
          <div class="level-popup-score" id="levelPopupScore">0</div>
          <div class="level-popup-objective" id="levelPopupObjective"></div>
          <div class="level-popup-buttons">
            <button class="level-popup-btn level-popup-btn--map" id="levelPopupMap">Map</button>
            <button class="level-popup-btn level-popup-btn--replay" id="levelPopupReplay">Retry</button>
            <button class="level-popup-btn level-popup-btn--next" id="levelPopupNext">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ LEADERBOARD POPUP ═══ -->
  <div class="lb-overlay" id="lbOverlay">
    <div class="lb-popup">
      <img src="/assets/ui/leaderboard-frame.webp" class="lb-popup__frame" draggable="false" alt="" />
      <div class="lb-popup__inner">
        <button type="button" class="lb-popup__close" id="lbClose" aria-label="Close leaderboard">
          <span class="lb-popup__close-glow" aria-hidden="true"></span>
        </button>
        <div class="lb-tabs" role="tablist" aria-label="Leaderboard period">
          <button type="button" class="lb-tab active" data-tab="weekly" role="tab" aria-selected="true">Weekly</button>
          <button type="button" class="lb-tab" data-tab="alltime" role="tab" aria-selected="false">All Time</button>
        </div>
        <div class="lb-content">
          <div class="lb-col lb-col--left" id="lbColLeft"></div>
          <div class="lb-col lb-col--right" id="lbColRight"></div>
        </div>
        <div class="lb-loading" id="lbLoading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- ═══ SHOP POPUP ═══ -->
  <div class="shop-overlay" id="shopOverlay">
    <div class="shop-popup">
      <img src="/assets/ui/shop-popup.png" class="shop-popup__img" draggable="false" alt="Ice Shop" />
      <button type="button" class="shop-popup__close" id="shopClose" aria-label="Close shop">
        <span class="shop-popup__close-glow" aria-hidden="true"></span>
      </button>
      <!-- Shop items overlaid on image slots -->
      <div class="shop-items">
        <div class="shop-item" data-item="colorBomb">
          <canvas class="shop-item__icon" id="shopBombCanvas"></canvas>
          <div class="shop-item__name">Color Bomb</div>
          <div class="shop-item__price">$2.99</div>
          <button type="button" class="shop-item__buy">
            <span class="shop-item__buy-glow" aria-hidden="true"></span>
            <span class="shop-item__buy-label">BUY</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ BOTTOM NAV BAR ═══ -->
  <nav class="nav-bar" id="navBar">
    <div class="nav-bar__inner">
      <img src="/assets/ui/navbar.png" class="nav-bar__bg" draggable="false" alt="" />
      <div class="nav-bar__buttons">
        <button class="nav-btn" data-page="home"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="map"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="shop"><span class="nav-btn__glow"></span></button>
        <button class="nav-btn" data-page="leaderboard"><span class="nav-btn__glow"></span></button>
      </div>
    </div>
  </nav>

  <script type="module" src="/src/entry.js"></script>
</body>
</html>
